name: anadoluchat
options:
  bundleIdPrefix: com.capish
  deploymentTarget:
    iOS: 16.0
    macOS: 13.0
  createIntermediateGroups: true
  
settings:
  MARKETING_VERSION: 1.0.0
  CURRENT_PROJECT_VERSION: 8

packages:
  P256K:
    url: https://github.com/21-DOT-DEV/swift-secp256k1
    majorVersion: 0.21.1
  
targets:
  bounchat_iOS:
    type: application
    platform: iOS
    sources: 
      - bitchat
    resources:
      - bitchat/Assets.xcassets
      - bitchat/LaunchScreen.storyboard
      - KULLANIM_SARTLARI.md
      - PRIVACY_POLICY.md
    info:
      path: bitchat/Info.plist
      properties:
        CFBundleDisplayName: bounchat
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        NSBluetoothAlwaysUsageDescription: bounchat, yakındaki kullanıcılarla sohbet etmek için güvenli bir mesh ağ oluşturmak amacıyla Bluetooth’u kullanır.
        NSLocationWhenInUseUsageDescription: bounchat, yakınınızdaki geohash kanallarını önermek için yaklaşık konumunuzu kullanır. Kesin GPS asla paylaşılmaz.
        NSBluetoothPeripheralUsageDescription: bounchat, yakındaki diğer bounchat kullanıcılarını keşfetmek ve bağlanmak için Bluetooth’u kullanır.
        UIBackgroundModes:
          - bluetooth-central
          - bluetooth-peripheral
        UILaunchStoryboardName: LaunchScreen
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIRequiresFullScreen: false
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              - bounchat
        # xcodegen quirk: include some macOS properties in iOS target
        LSMinimumSystemVersion: $(MACOSX_DEPLOYMENT_TARGET)
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.capish.buapp
      PRODUCT_NAME: bounchat
      INFOPLIST_FILE: bitchat/Info.plist
      ENABLE_PREVIEWS: YES
      SWIFT_VERSION: 5.0
      IPHONEOS_DEPLOYMENT_TARGET: 16.0
      SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: YES
      CODE_SIGN_STYLE: Automatic
      CODE_SIGNING_REQUIRED: YES
      CODE_SIGNING_ALLOWED: YES
      DEVELOPMENT_TEAM: ""
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      ASSETCATALOG_COMPILER_INCLUDE_ALL_APPICON_ASSETS: YES
      CODE_SIGN_ENTITLEMENTS: bitchat/bitchat.entitlements
    dependencies:
      - package: P256K
        product: P256K
        
  bounchat_macOS:
    type: application
    platform: macOS
    sources: 
      - bitchat
    resources:
      - bitchat/Assets.xcassets
      - KULLANIM_SARTLARI.md
      - PRIVACY_POLICY.md
    info:
      path: bitchat/Info.plist
      properties:
        CFBundleDisplayName: bounchat
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        LSMinimumSystemVersion: $(MACOSX_DEPLOYMENT_TARGET)
        NSBluetoothAlwaysUsageDescription: bounchat, yakındaki kullanıcılarla sohbet etmek için güvenli bir mesh ağ oluşturmak amacıyla Bluetooth’u kullanır.
        # macOS uses NSLocationUsageDescription; iOS key is included only in iOS target above
        NSBluetoothPeripheralUsageDescription: bounchat, yakındaki diğer bounchat kullanıcılarını keşfetmek ve bağlanmak için Bluetooth’u kullanır.
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              - bounchat
        # xcodegen quirk: include some iOS properties in macOS target
        UIBackgroundModes:
          - bluetooth-central
          - bluetooth-peripheral
        UILaunchStoryboardName: LaunchScreen
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIRequiresFullScreen: true
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.capish.buapp
      PRODUCT_NAME: bounchat
      INFOPLIST_FILE: bitchat/Info.plist
      ENABLE_PREVIEWS: YES
      SWIFT_VERSION: 5.0
      MACOSX_DEPLOYMENT_TARGET: 13.0
      CODE_SIGN_STYLE: Automatic
      CODE_SIGNING_REQUIRED: YES
      CODE_SIGNING_ALLOWED: YES
      DEVELOPMENT_TEAM: ""
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      ASSETCATALOG_COMPILER_INCLUDE_ALL_APPICON_ASSETS: YES
      CODE_SIGN_ENTITLEMENTS: bitchat/bitchat-macOS.entitlements
    dependencies:
      - package: P256K
        product: P256K


  bounchatTests_iOS:
    type: bundle.unit-test
    platform: iOS
    sources: 
      - bitchatTests
    dependencies:
      - target: bounchat_iOS
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.capish.buapp.tests
      INFOPLIST_FILE: bitchatTests/Info.plist
      SWIFT_VERSION: 5.0
      IPHONEOS_DEPLOYMENT_TARGET: 16.0
      TEST_HOST: $(BUILT_PRODUCTS_DIR)/bitchat.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/bitchat
      BUNDLE_LOADER: $(TEST_HOST)
      CODE_SIGN_STYLE: Automatic
      CODE_SIGNING_REQUIRED: YES
      CODE_SIGNING_ALLOWED: YES
      DEVELOPMENT_TEAM: ""
      
  bounchatTests_macOS:
    type: bundle.unit-test
    platform: macOS
    sources: 
      - bitchatTests
    dependencies:
      - target: bounchat_macOS
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.capish.buapp.tests
      INFOPLIST_FILE: bitchatTests/Info.plist
      SWIFT_VERSION: 5.0
      MACOSX_DEPLOYMENT_TARGET: 13.0
      TEST_HOST: $(BUILT_PRODUCTS_DIR)/bitchat.app/Contents/MacOS/bitchat
      BUNDLE_LOADER: $(TEST_HOST)
      CODE_SIGN_STYLE: Automatic
      CODE_SIGNING_REQUIRED: YES
      CODE_SIGNING_ALLOWED: YES
      DEVELOPMENT_TEAM: ""

schemes:
  bounchat (iOS):
    build:
      targets:
        bounchat_iOS: all
    run:
      config: Debug
      executable: bounchat_iOS
    test:
      config: Debug
      targets:
        - bounchatTests_iOS
    profile:
      config: Release
      executable: bounchat_iOS
    analyze:
      config: Debug
    archive:
      config: Release
      
  bounchat (macOS):
    build:
      targets:
        bounchat_macOS: all
    run:
      config: Debug
      executable: bounchat_macOS
    test:
      config: Debug
      targets:
        - bounchatTests_macOS
    profile:
      config: Release
      executable: bounchat_macOS
    analyze:
      config: Debug
    archive:
      config: Release
